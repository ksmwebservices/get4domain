# ============================================================
# GET4DOMAIN — Nginx Configuration
# Add this to /etc/nginx/sites-available/get4domain
# Then: sudo ln -s /etc/nginx/sites-available/get4domain /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# Main domain — get4domain.com and get4domain.in
server {
    listen 80;
    server_name get4domain.com www.get4domain.com get4domain.in www.get4domain.in;

    # Redirect www to non-www
    if ($host ~* ^www\.(.*)) {
        set $host_without_www $1;
        rewrite ^(.*)$ https://$host_without_www$1 permanent;
    }

    # Redirect HTTP to HTTPS (Cloudflare handles SSL, but keep this for direct hits)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name get4domain.com get4domain.in;

    # SSL — managed by Cloudflare / Certbot
    # ssl_certificate /etc/letsencrypt/live/get4domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/get4domain.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to Get4Domain Next.js frontend (port 3001)
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Static assets cache
    location /_next/static {
        proxy_pass http://localhost:3001;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# NOTE: MR Travels stays on its own vhost — DO NOT MODIFY
# mrtravels.get4domain.com → port 3000 (existing, untouched)
# api.get4domain.com → port 3002 (existing MR Travels backend, untouched)

